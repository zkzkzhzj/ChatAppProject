name: CD

concurrency:
  group: prod-deploy
  cancel-in-progress: false

on:
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types: [completed]
  workflow_dispatch:
    inputs:
      force_rebuild:
        description: "Deprecated; CD now rebuilds both images"
        required: false
        type: boolean
        default: false

permissions:
  id-token: write
  contents: read
  packages: write

env:
  AWS_REGION: ap-northeast-2
  IMAGE_APP: ghcr.io/zkzkzhzj/gohyang-app
  IMAGE_FRONTEND: ghcr.io/zkzkzhzj/gohyang-frontend
  DEPLOY_SHA: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

jobs:
  build-backend:
    name: Build backend image
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.DEPLOY_SHA }}

      - uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.IMAGE_APP }}:${{ env.DEPLOY_SHA }}
            ${{ env.IMAGE_APP }}:latest
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

  build-frontend:
    name: Build frontend image
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.DEPLOY_SHA }}

      - uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v7
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.IMAGE_FRONTEND }}:${{ env.DEPLOY_SHA }}
            ${{ env.IMAGE_FRONTEND }}:latest
          build-args: |
            NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL || 'https://ghworld.co' }}
            NEXT_PUBLIC_WS_URL=${{ vars.NEXT_PUBLIC_WS_URL || 'https://ghworld.co/ws' }}
            NEXT_PUBLIC_ASSETS_BASE_URL=${{ vars.NEXT_PUBLIC_ASSETS_BASE_URL || 'https://d9btdaowoaya0.cloudfront.net' }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

  deploy:
    name: Deploy to EC2 with SSM
    needs: [build-backend, build-frontend]
    if: |
      always() &&
      needs.build-backend.result == 'success' &&
      needs.build-frontend.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials with OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Resolve deploy tags
        id: tags
        run: |
          echo "app_tag=${{ env.DEPLOY_SHA }}" >> "$GITHUB_OUTPUT"
          echo "frontend_tag=${{ env.DEPLOY_SHA }}" >> "$GITHUB_OUTPUT"

      - name: Run deploy command through SSM
        id: ssm
        env:
          COMMIT_SHA: ${{ env.DEPLOY_SHA }}
          APP_TAG: ${{ steps.tags.outputs.app_tag }}
          FRONTEND_TAG: ${{ steps.tags.outputs.frontend_tag }}
          INSTANCE_ID: ${{ secrets.EC2_INSTANCE_ID }}
        run: |
          set -euo pipefail

          echo "Deploying commit=$COMMIT_SHA APP_TAG=${APP_TAG:-<keep>} FRONTEND_TAG=${FRONTEND_TAG:-<keep>} to $INSTANCE_ID"

          PARAMS=$(jq -n \
            --arg sha "$COMMIT_SHA" \
            --arg app "$APP_TAG" \
            --arg front "$FRONTEND_TAG" \
            '{commands: ["sudo -u ubuntu bash /home/ubuntu/ChatAppProject/deploy/scripts/deploy.sh \"\($sha)\" \"\($app)\" \"\($front)\""]}')

          CMD_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --comment "CD $COMMIT_SHA" \
            --parameters "$PARAMS" \
            --query 'Command.CommandId' \
            --output text)

          echo "Command ID: $CMD_ID"
          echo "command_id=$CMD_ID" >> "$GITHUB_OUTPUT"

      - name: Wait for deploy and collect logs
        env:
          INSTANCE_ID: ${{ secrets.EC2_INSTANCE_ID }}
          CMD_ID: ${{ steps.ssm.outputs.command_id }}
        run: |
          set -euo pipefail

          for i in $(seq 1 60); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$CMD_ID" \
              --instance-id "$INSTANCE_ID" \
              --query 'Status' \
              --output text 2>/dev/null || echo "Pending")

            echo "[$i/60] Status: $STATUS"

            case "$STATUS" in
              Success)
                echo "----- stdout -----"
                aws ssm get-command-invocation \
                  --command-id "$CMD_ID" \
                  --instance-id "$INSTANCE_ID" \
                  --query 'StandardOutputContent' \
                  --output text
                exit 0
                ;;
              Failed|Cancelled|TimedOut)
                echo "----- stdout -----"
                aws ssm get-command-invocation \
                  --command-id "$CMD_ID" \
                  --instance-id "$INSTANCE_ID" \
                  --query 'StandardOutputContent' \
                  --output text || true
                echo "----- stderr -----"
                aws ssm get-command-invocation \
                  --command-id "$CMD_ID" \
                  --instance-id "$INSTANCE_ID" \
                  --query 'StandardErrorContent' \
                  --output text || true
                exit 1
                ;;
            esac

            sleep 10
          done

          echo "Deploy timed out after 10 minutes"
          exit 1
