# docker-compose 환경에서 활성화되는 프로파일.
# 컨테이너 간 통신은 서비스명을 호스트명으로 사용한다.
# 연결 정보는 application.yml의 환경변수 기본값을 오버라이드한다.

jwt:
  secret: ${JWT_SECRET:docker-dev-only-secret-key-must-be-at-least-256-bits-long!!}

spring:
  datasource:
    url: jdbc:postgresql://postgres:5432/gohyang

  data:
    redis:
      host: redis

  kafka:
    bootstrap-servers: kafka:9092

  cassandra:
    contact-points: cassandra

npc:
  ollama:
    base-url: ${OLLAMA_BASE_URL:http://ollama:11434}

security:
  env-public-paths:
    - /actuator/health  # docker 환경에서는 헬스체크 엔드포인트만 허용
