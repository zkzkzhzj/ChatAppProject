# 테스트 프로파일 설정.
# 연결 정보(datasource, redis, kafka)는 BaseTestContainers의 @DynamicPropertySource가 주입한다.
# 여기서는 Testcontainers가 다루지 않는 설정만 오버라이드한다.

jwt:
  secret: test-only-secret-key-must-be-at-least-256-bits-long-value!!

spring:
  # Cassandra: Phase 3 (Communication) 구현으로 이제 Testcontainers에서 기동한다.
  # 연결 정보는 BaseTestContainers의 @DynamicPropertySource가 주입한다.

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true

management:
  health:
    # Redis: GenericContainer로 실제 기동되지만 health indicator 연동이 불안정하므로 비활성화.
    # 실제 Redis 연결 자체는 @DynamicPropertySource로 정상 주입된다.
    redis:
      enabled: false

security:
  env-public-paths:
    - /actuator/health

logging:
  level:
    com.maeum.gohyang: DEBUG
    org.springframework.test: INFO
