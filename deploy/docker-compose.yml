# 전체 스택 실행 정의 (로컬 개발 + 프로덕션 공용).
#
# 사용법:
#   docker compose up --build     # 전체 빌드 + 시작 (로컬 개발)
#   docker compose up -d --wait   # 백그라운드 + healthcheck 대기
#   docker compose down           # 종료 (볼륨 유지)
#   docker compose down -v        # 종료 + 볼륨 삭제
#
# 경로 규칙:
#   이 파일 위치: deploy/docker-compose.yml
#   build context는 레포 루트 기준 상대경로 (../backend, ../frontend)
#   docker compose 명령은 deploy/ 디렉토리에서 실행해야 함.
#
# 환경변수 오버라이드: .env 파일 (이 디렉토리의).
# 참고: docs/learning/38-env-var-config-migration.md

services:

  postgres:
    # pgvector 확장 포함 — 대화 맥락 요약 벡터 저장용
    image: pgvector/pgvector:pg16
    container_name: gohyang-postgres
    environment:
      POSTGRES_DB: gohyang
      POSTGRES_USER: ${DB_USERNAME:-gohyang}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-gohyang}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gohyang -d gohyang"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  redis:
    # Redis 7.x 사용 — 8.0부터 라이선스가 BSD에서 RSALv2/SSPLv1로 변경됨 (ADR-001 참조)
    image: redis:7.2-alpine
    container_name: gohyang-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  cassandra:
    # 채팅 메시지 저장소 — write-once, 시간순 조회에 최적화 (ADR-001 참조)
    image: cassandra:4.1
    container_name: gohyang-cassandra
    ports:
      - "${CASSANDRA_PORT:-9042}:9042"
    environment:
      CASSANDRA_CLUSTER_NAME: gohyang
      CASSANDRA_DC: datacenter1
      CASSANDRA_ENDPOINT_SNITCH: GossipingPropertyFileSnitch
      MAX_HEAP_SIZE: ${CASSANDRA_MAX_HEAP:-1G}
      HEAP_NEWSIZE: ${CASSANDRA_HEAP_NEW:-200M}
    volumes:
      - cassandra_data:/var/lib/cassandra
    healthcheck:
      # Cassandra 초기 기동은 최대 60초 소요됨
      test: ["CMD-SHELL", "nodetool status | grep UN"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    restart: unless-stopped

  kafka:
    # KRaft 모드 (Zookeeper 없음) — apache/kafka 3.7+ 기본 지원 (ADR-001 참조)
    # 컨테이너 간 통신: kafka:9092, 호스트 접근: localhost:${KAFKA_PORT}
    image: apache/kafka:3.7.0
    container_name: gohyang-kafka
    ports:
      - "${KAFKA_PORT:-9092}:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_HEAP_OPTS: ${KAFKA_HEAP_OPTS:--Xmx512m -Xms256m}
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  ollama:
    # 로컬 LLM 서빙. NPC_ADAPTER=ollama 일 때만 필요.
    # 명시적으로 프로필을 지정해야 뜸: docker compose --profile ollama up
    profiles:
      - ollama
    image: ollama/ollama:latest
    container_name: gohyang-ollama
    entrypoint: ["/bin/bash", "/ollama-entrypoint.sh"]
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ollama_data:/root/.ollama
      - ./ollama-entrypoint.sh:/ollama-entrypoint.sh:ro
    environment:
      OLLAMA_NUM_PARALLEL: 2
      OLLAMA_PULL_MODELS: ${OLLAMA_PULL_MODELS:-exaone3.5:7.8b nomic-embed-text}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:11434/api/tags || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  app:
    # 프로덕션(CD): GHCR 이미지를 pull해서 사용
    # 로컬: docker compose build 시 ../backend 에서 빌드 (build 블록 사용)
    image: ghcr.io/zkzkzhzj/gohyang-app:${APP_TAG:-latest}
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: gohyang-app
    ports:
      - "${APP_PORT:-8080}:8080"
    environment:
      # ── Spring 표준 매핑 (자동으로 spring.datasource.url 등에 바인딩) ──
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/gohyang
      DB_USERNAME: ${DB_USERNAME:-gohyang}
      DB_PASSWORD: ${DB_PASSWORD:-gohyang}

      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}

      CASSANDRA_HOST: cassandra
      CASSANDRA_PORT: 9042

      KAFKA_BOOTSTRAP_SERVERS: kafka:9092

      # ── 시크릿 (로컬은 기본값, 운영은 .env에서 덮어씀) ──
      JWT_SECRET: ${JWT_SECRET:-local-dev-only-secret-key-must-be-at-least-256-bits-long!!}

      # ── NPC / OpenAI ──
      NPC_ADAPTER: ${NPC_ADAPTER:-hardcoded}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OLLAMA_BASE_URL: http://ollama:11434

      # ── 네트워크 / CORS ──
      APP_CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:3001}

      # ── 운영 보안 강화용 (로컬 기본값은 개발 편의, .env에서 엄격하게) ──
      ACTUATOR_ENDPOINTS: ${ACTUATOR_ENDPOINTS:-health,info,metrics}
      ACTUATOR_HEALTH_DETAILS: ${ACTUATOR_HEALTH_DETAILS:-when-authorized}
      HEALTH_REDIS_ENABLED: ${HEALTH_REDIS_ENABLED:-false}
      SECURITY_COMMON_PUBLIC_PATHS: ${SECURITY_COMMON_PUBLIC_PATHS:-/api/v1/auth/register,/api/v1/auth/login,/api/v1/auth/guest,/ws/**,/swagger-ui/**,/swagger-ui.html,/v3/api-docs/**,/webjars/**}
      SECURITY_ENV_PUBLIC_PATHS: ${SECURITY_ENV_PUBLIC_PATHS:-/actuator/**}

      # ── 로깅 ──
      LOG_LEVEL_ROOT: ${LOG_LEVEL_ROOT:-INFO}
      LOG_LEVEL_APP: ${LOG_LEVEL_APP:-DEBUG}

      # ── JVM ──
      JAVA_TOOL_OPTIONS: ${JAVA_TOOL_OPTIONS:--Xmx384m -Xms256m}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      cassandra:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/actuator/health | grep UP || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 60s
    restart: unless-stopped

  frontend:
    # Next.js 프론트엔드 — standalone 모드 빌드, 백엔드 API를 app:8080으로 프록시
    # 프로덕션(CD)에서는 GHCR 이미지를 pull. 로컬에서는 ../frontend 에서 빌드.
    image: ghcr.io/zkzkzhzj/gohyang-frontend:${FRONTEND_TAG:-latest}
    build:
      context: ../frontend
      dockerfile: Dockerfile
      # NEXT_PUBLIC_* 는 빌드 타임에 Next.js 번들에 인라인된다.
      # 브라우저에서 직접 백엔드에 요청하므로 호스트 관점 주소를 사용한다.
      args:
        NEXT_PUBLIC_API_URL: ${PUBLIC_API_URL:-http://localhost:8080}
        NEXT_PUBLIC_WS_URL: ${PUBLIC_WS_URL:-http://localhost:8080/ws}
    container_name: gohyang-frontend
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      app:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  cassandra_data:
    driver: local
  ollama_data:
    driver: local
