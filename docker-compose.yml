# 로컬 전체 스택 실행 정의.
#
# 사용법:
#   docker-compose up --build     전체 빌드 후 시작 (Spring Boot 포함)
#   docker-compose up -d          백그라운드 실행
#   docker-compose down           종료 (볼륨 유지)
#   docker-compose down -v        종료 + 볼륨 삭제
#
# 포트 충돌 시 .env 파일로 오버라이드 가능.
#   예) POSTGRES_PORT=5433

services:

  postgres:
    # pgvector 확장 포함 — 대화 맥락 요약 벡터 저장용
    image: pgvector/pgvector:pg16
    container_name: gohyang-postgres
    environment:
      POSTGRES_DB: gohyang
      POSTGRES_USER: ${DB_USERNAME:-gohyang}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-gohyang}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gohyang -d gohyang"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  redis:
    # Redis 7.x 사용 — 8.0부터 라이선스가 BSD에서 RSALv2/SSPLv1로 변경됨 (ADR-001 참조)
    image: redis:7.2-alpine
    container_name: gohyang-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  cassandra:
    # 채팅 메시지 저장소 — write-once, 시간순 조회에 최적화 (ADR-001 참조)
    image: cassandra:4.1
    container_name: gohyang-cassandra
    ports:
      - "${CASSANDRA_PORT:-9042}:9042"
    environment:
      CASSANDRA_CLUSTER_NAME: gohyang
      CASSANDRA_DC: datacenter1
      CASSANDRA_ENDPOINT_SNITCH: GossipingPropertyFileSnitch
    volumes:
      - cassandra_data:/var/lib/cassandra
    healthcheck:
      # Cassandra 초기 기동은 최대 60초 소요됨
      test: ["CMD-SHELL", "nodetool status | grep UN"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    restart: unless-stopped

  kafka:
    # KRaft 모드 (Zookeeper 없음) — apache/kafka 3.7+ 기본 지원 (ADR-001 참조)
    # 컨테이너 간 통신: kafka:9092, 호스트 접근: localhost:${KAFKA_PORT}
    image: apache/kafka:3.7.0
    container_name: gohyang-kafka
    ports:
      - "${KAFKA_PORT:-9092}:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  ollama:
    # 로컬 LLM 서빙. NPC_ADAPTER=ollama 일 때만 필요.
    # 명시적으로 프로필을 지정해야 뜸: docker compose --profile ollama up
    profiles:
      - ollama
    image: ollama/ollama:latest
    container_name: gohyang-ollama
    entrypoint: ["/bin/bash", "/ollama-entrypoint.sh"]
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ollama_data:/root/.ollama
      - ./ollama-entrypoint.sh:/ollama-entrypoint.sh:ro
    environment:
      OLLAMA_NUM_PARALLEL: 2
      # 자동 pull할 모델 목록 (공백 구분). OLLAMA_MODELS는 Ollama 예약어이므로 사용 금지.
      OLLAMA_PULL_MODELS: ${OLLAMA_PULL_MODELS:-exaone3.5:7.8b nomic-embed-text}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:11434/api/tags || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gohyang-app
    ports:
      - "${APP_PORT:-8080}:8080"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-local}
      DB_HOST: postgres
      REDIS_HOST: redis
      CASSANDRA_HOST: cassandra
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      DB_USERNAME: ${DB_USERNAME:-gohyang}
      DB_PASSWORD: ${DB_PASSWORD:-gohyang}
      JWT_SECRET: ${JWT_SECRET:-local-dev-only-secret-key-must-be-at-least-256-bits-long!!}
      NPC_ADAPTER: ${NPC_ADAPTER:-hardcoded}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OLLAMA_BASE_URL: http://ollama:11434
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      cassandra:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/actuator/health | grep UP || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 60s
    restart: unless-stopped

  frontend:
    # Next.js 프론트엔드 — standalone 모드 빌드, 백엔드 API를 app:8080으로 프록시
    build:
      context: ./frontend
      dockerfile: Dockerfile
      # NEXT_PUBLIC_* 는 빌드 타임에 번들에 인라인된다.
      # 브라우저에서 직접 백엔드에 요청하므로 호스트 관점 주소를 사용한다.
      # 값은 .env 파일에서 관리. 기본값(localhost)은 로컬 개발 전용.
      args:
        NEXT_PUBLIC_API_URL: ${PUBLIC_API_URL:-http://localhost:8080}
        NEXT_PUBLIC_WS_URL: ${PUBLIC_WS_URL:-http://localhost:8080/ws}
    container_name: gohyang-frontend
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      app:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  cassandra_data:
    driver: local
  ollama_data:
    driver: local
